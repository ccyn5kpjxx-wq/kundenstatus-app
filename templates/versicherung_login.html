<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ versicherung['name'] }} - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { min-height:100vh; background:#16202a; display:flex; align-items:center; padding:18px; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    .login-card { max-width:480px; width:100%; border-radius:22px; padding:32px; }
    .form-control, .btn { min-height:48px; font-size:16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="mx-auto bg-white shadow login-card">
      <div class="text-center mb-4">
        <h1 class="h3 mb-2">{{ versicherung['name'] }}</h1>
        <div class="text-muted">Versicherungsportal</div>
      </div>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}
      <form method="POST" autocomplete="on">
        <input type="text" name="username" value="{{ versicherung['portal_key'] }}" autocomplete="username" class="visually-hidden" tabindex="-1" aria-hidden="true" readonly>
        <div class="mb-3">
          <label class="form-label" for="zugangscode">Passwort / Zugangscode</label>
          <input type="password" id="zugangscode" name="password" class="form-control form-control-lg" autocomplete="current-password" autofocus required>
        </div>
        <button type="submit" class="btn btn-dark w-100 btn-lg">Einloggen</button>
      </form>
    </div>
  </div>
</body>
</html>
