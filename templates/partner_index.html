<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Autohaus-Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: #182635;
      display: flex;
      align-items: center;
      padding: 18px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .login-card {
      max-width: 520px;
      width: 100%;
      border-radius: 24px;
      padding: 32px;
    }
    .form-select,
    .form-control,
    .btn {
      min-height: 48px;
      font-size: 16px;
    }
    @media (max-width: 575.98px) {
      body { align-items: flex-start; padding: 14px; }
      .container { padding: 0; }
      .login-card { padding: 24px 18px; border-radius: 18px; margin-top: 24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="mx-auto bg-white shadow login-card">
      <div class="text-center mb-4">
        <h1 class="h3 mb-2">Autohaus-Portal</h1>
        <div class="text-muted">Bitte Autohaus auswählen und mit dem Zugangscode anmelden.</div>
      </div>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Autohaus</label>
          <select name="portal_key" class="form-select form-select-lg" required autofocus>
            <option value="">Bitte auswählen</option>
            {% for autohaus in autohaeuser %}
            <option value="{{ autohaus['portal_key'] }}">{{ autohaus['name'] }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Passwort / Zugangscode</label>
          <input type="password" name="zugangscode" class="form-control form-control-lg" required>
        </div>
        <button type="submit" class="btn btn-dark w-100 btn-lg">Einloggen</button>
      </form>
    </div>
  </div>
</body>
</html>
