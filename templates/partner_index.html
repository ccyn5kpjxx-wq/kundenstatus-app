<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Autohaus-Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: #182635;
      display: flex;
      align-items: center;
      padding: 18px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .login-card {
      max-width: 520px;
      width: 100%;
      border-radius: 24px;
      padding: 32px;
    }
    .form-select,
    .form-control,
    .btn {
      min-height: 48px;
      font-size: 16px;
    }
    @media (max-width: 575.98px) {
      body { align-items: flex-start; padding: 14px; }
      .container { padding: 0; }
      .login-card { padding: 24px 18px; border-radius: 18px; margin-top: 24px; }
    }
  </style>
</head>
<body>
  {% include "_live_clock_widget.html" %}
  <div class="container">
    <div class="mx-auto bg-white shadow login-card">
      <div class="text-center mb-4">
        <h1 class="h3 mb-2">Autohaus-Portal</h1>
        <div class="text-muted">Bitte Autohaus auswählen und mit dem Zugangscode anmelden.</div>
      </div>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}
      <form method="POST" autocomplete="on">
        <input
          type="text"
          id="partner-benutzername"
          name="benutzername"
          autocomplete="username"
          class="visually-hidden"
          tabindex="-1"
          aria-hidden="true"
          readonly
        >
        <div class="mb-3">
          <label class="form-label" for="portal_key">Autohaus</label>
          <select id="portal_key" name="portal_key" class="form-select form-select-lg" required autofocus>
            <option value="">Bitte auswählen</option>
            {% for autohaus in autohaeuser %}
            <option value="{{ autohaus['portal_key'] }}">{{ autohaus['name'] }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label" for="zugangscode">Passwort / Zugangscode</label>
          <input
            type="password"
            id="zugangscode"
            name="zugangscode"
            class="form-control form-control-lg"
            autocomplete="current-password"
            required
          >
        </div>
        <button type="submit" class="btn btn-dark w-100 btn-lg">Einloggen</button>
      </form>
    </div>
  </div>
  <script>
    (() => {
      const portalSelect = document.getElementById("portal_key");
      const usernameInput = document.getElementById("partner-benutzername");
      if (!portalSelect || !usernameInput) return;
      const syncUsername = () => {
        usernameInput.value = portalSelect.value || "";
      };
      portalSelect.addEventListener("change", syncUsername);
      syncUsername();
    })();
  </script>
</body>
</html>
