<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ autohaus['portal_label'] }} — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background:#182635;
      min-height:100vh;
      display:flex;
      align-items:center;
      padding:18px;
    }
    .login-card {
      max-width:460px;
      width:100%;
      border-radius:24px;
      padding:32px;
    }
    .form-control,
    .btn {
      min-height:48px;
      font-size:16px;
    }
    .access-code-input {
      text-transform:uppercase;
      letter-spacing:.04em;
    }
    @media (max-width: 575.98px) {
      body { align-items:flex-start; padding:14px; }
      .container { padding:0; }
      .login-card { padding:24px 18px; border-radius:18px; margin-top:24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="mx-auto bg-white shadow login-card">
      <div class="text-center mb-4">
        <h1 class="h3 mb-2">{{ autohaus['portal_label'] }}</h1>
        <div class="text-muted">{{ autohaus['portal_welcome'] }}</div>
      </div>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}
      <form method="POST" autocomplete="on">
        <input
          type="text"
          name="benutzername"
          value="{{ autohaus['portal_key'] or autohaus['slug'] }}"
          autocomplete="username"
          class="visually-hidden"
          tabindex="-1"
          aria-hidden="true"
          readonly
        >
        <div class="mb-3">
          <label class="form-label" for="zugangscode">Zugangscode</label>
          <input
            type="password"
            id="zugangscode"
            name="zugangscode"
            class="form-control form-control-lg access-code-input"
            autocomplete="current-password"
            autocapitalize="characters"
            spellcheck="false"
            required
            autofocus
          >
        </div>
        <button type="submit" class="btn btn-dark w-100 btn-lg">Einloggen</button>
      </form>
    </div>
  </div>
  <script>
    (() => {
      const input = document.getElementById('zugangscode');
      if (!input) return;
      const focusInput = () => input.focus({ preventScroll: true });
      window.addEventListener('load', focusInput);
      document.querySelector('.login-card')?.addEventListener('click', focusInput);
      input.addEventListener('input', () => {
        const start = input.selectionStart;
        const end = input.selectionEnd;
        input.value = input.value.toUpperCase().trim();
        input.setSelectionRange(start, end);
      });
    })();
  </script>
</body>
</html>
