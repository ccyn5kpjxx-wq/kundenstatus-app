<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Gärtner Kundenstatus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      /* Heller Portal-Hintergrund wie base.html */
      background:
        radial-gradient(circle at top left, rgba(162, 63, 45, 0.08), transparent 28%),
        radial-gradient(circle at top right, rgba(20, 93, 102, 0.08), transparent 32%),
        linear-gradient(180deg, #f7f2ea 0%, #f3efe6 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:18px;
      color:#3d3428;
    }
    .card {
      background:#fffdf9;
      border:1px solid #ddd1c0;
      border-radius:16px;
      box-shadow:0 16px 40px rgba(64, 47, 25, 0.12);
    }
  </style>
</head>
<body>
<div class="card p-5" style="width:min(360px, 100%);">
  <div class="text-center mb-4">
    <img src="{{ url_for('static', filename='logo.png') }}" style="height:50px;" alt="Logo">
    <h5 class="mt-3 text-muted">Admin-Login</h5>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST" autocomplete="on">
    <div class="mb-3">
      <label class="form-label" for="username">Benutzer</label>
      <input
        type="text"
        id="username"
        name="username"
        value="admin"
        class="form-control form-control-lg"
        autocomplete="username"
        readonly
      >
    </div>
    <div class="mb-3">
      <label class="form-label" for="password">Passwort</label>
      <input
        type="password"
        id="password"
        name="password"
        class="form-control form-control-lg"
        placeholder="Passwort"
        autocomplete="current-password"
        autofocus
        required
      >
    </div>
    <button type="submit" class="btn btn-dark w-100 btn-lg">Einloggen</button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
