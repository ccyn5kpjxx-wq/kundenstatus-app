<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Login — Gärtner Kundenstatus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#1a1a2e; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .card { border:none; border-radius:16px; box-shadow:0 8px 30px rgba(0,0,0,.3); }
  </style>
</head>
<body>
{% include "_live_clock_widget.html" %}
<div class="card p-5" style="width:360px;">
  <div class="text-center mb-4">
    <img src="{{ url_for('static', filename='logo.png') }}" style="height:50px;" alt="Logo">
    <h5 class="mt-3 text-muted">Admin-Login</h5>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST" autocomplete="on">
    <input
      type="text"
      name="benutzername"
      value="admin"
      autocomplete="username"
      class="visually-hidden"
      tabindex="-1"
      aria-hidden="true"
      readonly
    >
    <div class="mb-3">
      <input
        type="password"
        id="passwort"
        name="passwort"
        class="form-control form-control-lg"
        placeholder="Passwort"
        autocomplete="current-password"
        autofocus
        required
      >
    </div>
    <button type="submit" class="btn btn-dark w-100 btn-lg">Einloggen</button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
