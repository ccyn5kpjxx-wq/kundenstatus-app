<style>
  .live-clock-widget {
    position: fixed;
    top: 14px;
    right: 14px;
    z-index: 1040;
    min-width: 190px;
    border: 1px solid rgba(216, 200, 177, .8);
    border-radius: 16px;
    background: #132635;
    color: #fff;
    padding: 12px 14px;
    text-align: right;
    box-shadow: 0 12px 32px rgba(0,0,0,.18);
  }
  .live-clock-widget-label {
    color: rgba(255,255,255,.72);
    font-size: .72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .live-clock-widget-time {
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: 1.55rem;
    line-height: 1;
    font-weight: 700;
    margin-top: .25rem;
  }
  .live-clock-widget-date {
    color: rgba(255,255,255,.82);
    font-size: .86rem;
    font-weight: 600;
    margin-top: .25rem;
  }
  @media (max-width: 575.98px) {
    .live-clock-widget {
      left: 14px;
      right: 14px;
      width: auto;
      min-width: 0;
      text-align: left;
    }
  }
</style>
<div class="live-clock-widget" data-live-clock-root>
  <div class="live-clock-widget-label">Heute</div>
  <div class="live-clock-widget-time" data-live-clock>--:--:--</div>
  <div class="live-clock-widget-date" data-live-date>--.--.----</div>
</div>
<script>
  (() => {
    const root = document.currentScript.previousElementSibling;
    if (!root || !root.matches('[data-live-clock-root]')) {
      return;
    }
    const timeTarget = root.querySelector('[data-live-clock]');
    const dateTarget = root.querySelector('[data-live-date]');
    const timeFormatter = new Intl.DateTimeFormat('de-DE', {
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
    });
    const dateFormatter = new Intl.DateTimeFormat('de-DE', {
      weekday: 'long',
      day: '2-digit',
      month: '2-digit',
      year: 'numeric',
    });
    const updateClock = () => {
      const now = new Date();
      if (timeTarget) {
        timeTarget.textContent = timeFormatter.format(now);
      }
      if (dateTarget) {
        dateTarget.textContent = dateFormatter.format(now);
      }
    };
    updateClock();
    window.setInterval(updateClock, 1000);
  })();
</script>
