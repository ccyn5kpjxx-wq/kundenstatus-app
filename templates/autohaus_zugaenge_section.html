<div class="page-card p-4 mb-4">
  <div class="section-title">
    <div>
      <div class="badge-soft mb-2">Zugänge</div>
      <h4 class="mb-1">Autohaus-Zugänge</h4>
      <p>Portalpfad und Zugangscode für bestehende Autohäuser.</p>
    </div>
  </div>

  {% if autohaeuser %}
    <div class="d-grid gap-2">
      {% for h in autohaeuser %}
      <div class="border rounded-3 p-3 bg-white d-flex justify-content-between align-items-center gap-3 flex-wrap">
        <div>
          <div class="fw-bold">{{ h['name'] }}</div>
          <div class="text-muted small">{{ h['portal_label'] }}</div>
        </div>
        <div class="text-lg-end">
          <code>{{ h['portal_url'] }}</code>
          <div class="small text-muted">Code: <strong>{{ h['zugangscode'] }}</strong></div>
        </div>
        <a href="{{ h['portal_url'] }}" target="_blank" class="btn btn-soft btn-sm">Lokal öffnen</a>
      </div>
      {% endfor %}
    </div>
  {% else %}
    <div class="text-muted">Noch kein Autohaus angelegt.</div>
  {% endif %}
</div>
