services:
  - type: web
    name: kundenstatus-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --timeout 120 app:app
    disk:
      name: kundenstatus-uploads
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: ADMIN_PASS
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: kundenstatus-db
          property: connectionString
      - key: REQUIRE_POSTGRES_ON_RENDER
        value: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_EXTRACTION_MODEL
        value: gpt-4o
      - key: AUTO_BACKUP_ON_STARTUP
        value: false
      - key: DATA_DIR
        value: /var/data
      - key: SQLITE_DB_PATH
        value: /var/data/auftraege.db
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: BACKUP_DIR
        value: /var/data/backups

databases:
  - name: kundenstatus-db
    databaseName: kundenstatus
    user: kundenstatus
